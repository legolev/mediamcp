name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC) + MCP registry auth
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # npm >= 11.5 supports OIDC Trusted Publishing natively.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run smoke
      - name: Check whether this version is already on npm
        id: npm-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "mediamcp@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already published — skipping publish steps."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.npm-check.outputs.skip == 'false'
        run: npm publish --access public
      - name: Publish to MCP registry
        if: steps.npm-check.outputs.skip == 'false'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
